version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: alsaif-gallery-web
    restart: unless-stopped
    ports:
      - "80:80"
    environment:
      - NGINX_HOST=localhost
      - NGINX_PORT=80
    volumes:
      # Mount volumes for development (comment out for production)
      - ./:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - alsaif-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    labels:
      - "com.alsaif.description=Al Saif Gallery Website"
      - "com.alsaif.version=1.0"

networks:
  alsaif-network:
    driver: bridge
    name: alsaif-network
