<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Clear Cache</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
</head>
<body>
    <h1>تم مسح الكاش</h1>
    <p>الآن افتح صفحة المستثمرين من جديد</p>
    <a href="ar/investors.html?v=2">صفحة المستثمرين العربية</a>
    <script>
        // Clear all caches
        if ('caches' in window) {
            caches.keys().then(function(names) {
                for (let name of names) caches.delete(name);
            });
        }
        
        // Reload after 2 seconds
        setTimeout(function() {
            window.location.href = 'ar/investors.html?v=' + Date.now();
        }, 2000);
    </script>
</body>
</html>
